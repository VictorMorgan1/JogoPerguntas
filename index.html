<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo - Descobrindo Brusque</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

    <div class="conteiner">
        <img src="assets/images/logoprefeitura.png" alt="Logo Prefeitura Brusque" class="logo">

        <div class="titulo-conteiner">
            <h1 class="titulo-principal">Descobrindo</h1>
            <h1 class="titulo-secundario">Brusque!</h1>
        </div>

        <form>
            <div class="campos">
                <div class="input-campo">
                    <label class="escrita-campo">Nome:</label>
                    <input type="text">
                </div>
            </div>

            <div class="campos">
                <div class="input-campo">
                    <label class="escrita-campo">Escola:</label>
                    <input type="text">
                </div>
            </div>

            <div class="campos">
                <div class="input-campo">
                    <label class="escrita-campo">Idade:</label>
                    <input type="text">
                </div>
            </div>

            <div class="botao-conteiner">
                <button type="submit" class="botao-jogar">Vamos Jogar!</button>
            </div>
        </form>
    </div>

</body>

</html>
